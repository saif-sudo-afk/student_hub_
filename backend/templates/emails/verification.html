<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Verify Your Email — Student Hub</title>
  <style>
    body { margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; background: #0f172a; color: #e2e8f0; }
    .wrapper { max-width: 600px; margin: 40px auto; background: #1e293b; border-radius: 12px; overflow: hidden; }
    .header { background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%); padding: 32px 40px; text-align: center; border-bottom: 2px solid #f59e0b; }
    .logo { font-size: 28px; font-weight: 800; color: #f59e0b; letter-spacing: 2px; }
    .logo span { color: #60a5fa; }
    .body { padding: 40px; }
    h2 { font-size: 22px; color: #f1f5f9; margin: 0 0 16px; }
    p { color: #cbd5e1; line-height: 1.7; font-size: 15px; }
    .cta { display: inline-block; margin-top: 28px; padding: 14px 32px; background: #22c55e; color: #fff; font-weight: 700; text-decoration: none; border-radius: 8px; font-size: 15px; }
    .footer { background: #0f172a; padding: 24px 40px; text-align: center; }
    .footer p { color: #475569; font-size: 13px; margin: 4px 0; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <div class="logo">STUDENT<span>HUB</span></div>
    </div>
    <div class="body">
      <h2>Verify your email address</h2>
      <p>Welcome to Student Hub, {{ first_name }}!</p>
      <p>Please click the button below to verify your email address and activate your account.</p>
      <a href="{{ verification_url }}" class="cta">Verify Email →</a>
      <p style="margin-top:24px;font-size:13px;color:#64748b;">If you did not create an account, you can safely ignore this email.</p>
    </div>
    <div class="footer">
      <p>© 2025 Student Hub. All rights reserved.</p>
    </div>
  </div>
</body>
</html>
