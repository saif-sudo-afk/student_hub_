<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }}</title>
  <style>
    body { margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; background: #0f172a; color: #e2e8f0; }
    .wrapper { max-width: 600px; margin: 40px auto; background: #1e293b; border-radius: 12px; overflow: hidden; }
    .header { background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%); padding: 32px 40px; text-align: center; border-bottom: 2px solid #f59e0b; }
    .logo { font-size: 28px; font-weight: 800; color: #f59e0b; letter-spacing: 2px; }
    .logo span { color: #60a5fa; }
    .body { padding: 40px; }
    .greeting { font-size: 18px; color: #93c5fd; margin-bottom: 8px; }
    h2 { font-size: 22px; color: #f1f5f9; margin: 0 0 16px; }
    p { color: #cbd5e1; line-height: 1.7; font-size: 15px; }
    .cta { display: inline-block; margin-top: 28px; padding: 14px 32px; background: #f59e0b; color: #0f172a; font-weight: 700; text-decoration: none; border-radius: 8px; font-size: 15px; }
    .footer { background: #0f172a; padding: 24px 40px; text-align: center; }
    .footer p { color: #475569; font-size: 13px; margin: 4px 0; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <div class="logo">STUDENT<span>HUB</span></div>
    </div>
    <div class="body">
      <p class="greeting">Hello, {{ recipient_name }},</p>
      <h2>{{ title }}</h2>
      <p>{{ message }}</p>
      {% if link %}
      <a href="{{ link }}" class="cta">View in Student Hub →</a>
      {% endif %}
    </div>
    <div class="footer">
      <p>© 2025 Student Hub. All rights reserved.</p>
      <p>This is an automated message. Please do not reply.</p>
    </div>
  </div>
</body>
</html>
